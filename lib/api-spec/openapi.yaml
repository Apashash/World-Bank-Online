openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bank Mondial API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: transfers
    description: Transfer operations
  - name: sub-accounts
    description: Sub-account management
  - name: referrals
    description: Referral system
  - name: kyc
    description: KYC verification
  - name: admin
    description: Admin operations
  - name: dashboard
    description: Dashboard data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /transfers:
    get:
      operationId: listTransfers
      tags: [transfers]
      summary: List transfers for current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, cancelled, expired]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of transfers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferList"
    post:
      operationId: createTransfer
      tags: [transfers]
      summary: Create a new transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferInput"
      responses:
        "201":
          description: Created transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/{id}:
    get:
      operationId: getTransfer
      tags: [transfers]
      summary: Get transfer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
    patch:
      operationId: updateTransfer
      tags: [transfers]
      summary: Update transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferUpdate"
      responses:
        "200":
          description: Updated transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
    delete:
      operationId: deleteTransfer
      tags: [transfers]
      summary: Delete transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /transfers/link/{token}:
    get:
      operationId: getTransferByToken
      tags: [transfers]
      summary: Get transfer by public link token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transfer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "404":
          description: Not found

  /transfers/{id}/confirm:
    post:
      operationId: confirmTransfer
      tags: [transfers]
      summary: Confirm receipt of transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /sub-accounts:
    get:
      operationId: listSubAccounts
      tags: [sub-accounts]
      summary: List sub-accounts
      responses:
        "200":
          description: List of sub-accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubAccount"
    post:
      operationId: createSubAccount
      tags: [sub-accounts]
      summary: Create sub-account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubAccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubAccount"

  /sub-accounts/{id}:
    get:
      operationId: getSubAccount
      tags: [sub-accounts]
      summary: Get sub-account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sub-account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubAccount"
    patch:
      operationId: updateSubAccount
      tags: [sub-accounts]
      summary: Update sub-account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubAccountUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubAccount"
    delete:
      operationId: deleteSubAccount
      tags: [sub-accounts]
      summary: Delete sub-account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /referrals:
    get:
      operationId: listReferrals
      tags: [referrals]
      summary: List my referrals
      responses:
        "200":
          description: List of referrals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Referral"

  /referrals/stats:
    get:
      operationId: getReferralStats
      tags: [referrals]
      summary: Get referral statistics
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStats"

  /kyc:
    get:
      operationId: getKyc
      tags: [kyc]
      summary: Get my KYC status
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kyc"
    post:
      operationId: submitKyc
      tags: [kyc]
      summary: Submit KYC documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kyc"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for current user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin - list all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, blocked, pending]
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{id}/block:
    patch:
      operationId: adminBlockUser
      tags: [admin]
      summary: Admin - block/unblock user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/balance:
    patch:
      operationId: adminUpdateBalance
      tags: [admin]
      summary: Admin - update user balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/transfers:
    get:
      operationId: adminListTransfers
      tags: [admin]
      summary: Admin - list all transfers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Transfers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferList"

  /admin/kyc:
    get:
      operationId: adminListKyc
      tags: [admin]
      summary: Admin - list all KYC submissions
      responses:
        "200":
          description: KYC list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kyc"

  /admin/kyc/{id}/review:
    patch:
      operationId: adminReviewKyc
      tags: [admin]
      summary: Admin - approve/reject KYC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycReview"
      responses:
        "200":
          description: Reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kyc"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin - global statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    RegisterInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        country:
          type: string
        password:
          type: string
        referralCode:
          type: ["string", "null"]
      required:
        - fullName
        - email
        - phone
        - country
        - password

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        country:
          type: string
        balance:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [active, blocked, pending]
        role:
          type: string
          enum: [user, admin]
        referralCode:
          type: string
        kycStatus:
          type: string
          enum: [none, pending, verified, rejected]
        iban:
          type: ["string", "null"]
        balanceAlertThreshold:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - clientId
        - fullName
        - email
        - phone
        - country
        - balance
        - currency
        - status
        - role
        - referralCode
        - kycStatus
        - createdAt

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        country:
          type: string

    Transfer:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        token:
          type: string
        beneficiaryName:
          type: string
        amount:
          type: number
        currency:
          type: string
        message:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, completed, cancelled, expired]
        accessType:
          type: string
          enum: [public, private, limited]
        expiresAt:
          type: ["string", "null"]
        reference:
          type: string
        createdAt:
          type: string
        confirmedAt:
          type: ["string", "null"]
        linkUrl:
          type: string
      required:
        - id
        - userId
        - token
        - beneficiaryName
        - amount
        - currency
        - status
        - accessType
        - reference
        - createdAt
        - linkUrl

    TransferList:
      type: object
      properties:
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/Transfer"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - transfers
        - total
        - page
        - limit

    TransferInput:
      type: object
      properties:
        beneficiaryName:
          type: string
        amount:
          type: number
        currency:
          type: string
        message:
          type: ["string", "null"]
        accessType:
          type: string
          enum: [public, private, limited]
        expiresAt:
          type: ["string", "null"]
      required:
        - beneficiaryName
        - amount
        - currency
        - accessType

    TransferUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, cancelled, expired]
        message:
          type: ["string", "null"]

    SubAccount:
      type: object
      properties:
        id:
          type: integer
        parentUserId:
          type: integer
        fullName:
          type: string
        email:
          type: string
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended]
        createdAt:
          type: string
      required:
        - id
        - parentUserId
        - fullName
        - email
        - permissions
        - status
        - createdAt

    SubAccountInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        password:
          type: string
        permissions:
          type: array
          items:
            type: string
      required:
        - fullName
        - email
        - password
        - permissions

    SubAccountUpdate:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended]

    Referral:
      type: object
      properties:
        id:
          type: integer
        referrerId:
          type: integer
        referredUserId:
          type: integer
        referredUserName:
          type: string
        status:
          type: string
          enum: [pending, confirmed, rewarded]
        reward:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - referrerId
        - referredUserId
        - referredUserName
        - status
        - createdAt

    ReferralStats:
      type: object
      properties:
        totalReferrals:
          type: integer
        confirmedReferrals:
          type: integer
        totalRewards:
          type: number
        pendingRewards:
          type: number
      required:
        - totalReferrals
        - confirmedReferrals
        - totalRewards
        - pendingRewards

    Kyc:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        documentType:
          type: string
          enum: [id_card, passport, driving_license]
        documentNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, verified, rejected]
        rejectionReason:
          type: ["string", "null"]
        submittedAt:
          type: string
        reviewedAt:
          type: ["string", "null"]
      required:
        - id
        - userId
        - documentType
        - status
        - submittedAt

    KycInput:
      type: object
      properties:
        documentType:
          type: string
          enum: [id_card, passport, driving_license]
        documentNumber:
          type: string
        documentFrontUrl:
          type: string
        documentBackUrl:
          type: ["string", "null"]
        selfieUrl:
          type: string
      required:
        - documentType
        - documentNumber
        - documentFrontUrl
        - selfieUrl

    KycReview:
      type: object
      properties:
        status:
          type: string
          enum: [verified, rejected]
        rejectionReason:
          type: ["string", "null"]
      required:
        - status

    DashboardSummary:
      type: object
      properties:
        balance:
          type: number
        currency:
          type: string
        totalTransfersSent:
          type: integer
        totalTransfersReceived:
          type: integer
        totalAmountSent:
          type: number
        totalAmountReceived:
          type: number
        pendingTransfers:
          type: integer
        activeSubAccounts:
          type: integer
        kycStatus:
          type: string
        iban:
          type: ["string", "null"]
      required:
        - balance
        - currency
        - totalTransfersSent
        - totalTransfersReceived
        - totalAmountSent
        - totalAmountReceived
        - pendingTransfers
        - activeSubAccounts
        - kycStatus

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [transfer_sent, transfer_received, transfer_confirmed, sub_account_created, kyc_updated, login, referral_joined, withdrawal, deposit, scheduled_transfer_executed, fund_request_paid]
        description:
          type: string
        amount:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - type
        - description
        - createdAt

    AdminUserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    BlockInput:
      type: object
      properties:
        blocked:
          type: boolean
      required:
        - blocked

    BalanceUpdate:
      type: object
      properties:
        balance:
          type: number
        reason:
          type: string
      required:
        - balance
        - reason

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        blockedUsers:
          type: integer
        totalTransfers:
          type: integer
        totalVolume:
          type: number
        pendingKyc:
          type: integer
        totalSubAccounts:
          type: integer
        totalReferrals:
          type: integer
      required:
        - totalUsers
        - activeUsers
        - blockedUsers
        - totalTransfers
        - totalVolume
        - pendingKyc
        - totalSubAccounts
        - totalReferrals
