  <body>
    <div id="app-loading">Chargement…</div>
    <div id="app-error"></div>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('app-error');
        var loading = document.getElementById('app-loading');
        if (el) {
          el.style.display = 'block';
          el.innerHTML = '<strong>Erreur de chargement</strong><br><pre style="white-space:pre-wrap;margin-top:12px;font-size:12px;background:#f3f4f6;padding:12px;border-radius:6px">' + (e.message || '') + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>';
        }
        if (loading) loading.style.display = 'none';
      });
    </script>
